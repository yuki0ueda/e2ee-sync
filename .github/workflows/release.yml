name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Inject Windows manifest version
        run: |
          go install github.com/tc-hib/go-winres@latest
          TAG="${GITHUB_REF_NAME#v}"
          WIN_VER="${TAG}.0"
          sed -i "s/\"version\": \"0.0.0.0\"/\"version\": \"${WIN_VER}\"/" cmd/e2ee-sync/winres/winres.json
          cd cmd/e2ee-sync && go-winres make --product-version="${WIN_VER}" --file-version="${WIN_VER}"

      - name: Build all platforms
        run: make build-all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
